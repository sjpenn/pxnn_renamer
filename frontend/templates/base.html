<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}PxNN it{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Geist+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Manrope', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    },
                    colors: {
                        stage:           '#0a0b0f',
                        'stage-raised':  '#13151c',
                        'stage-sunken':  '#07080b',
                        rail:            '#1c1f2a',
                        hairline:        '#232836',
                        ink:             '#eef2ff',
                        'ink-dim':       '#8b92a8',
                        'ink-mute':      '#545a6e',
                        cyan:            '#00f0ff',
                        'cyan-soft':     '#0088a3',
                        magenta:         '#ff2d95',
                        amber:           '#ffb300',
                        success:         '#2de89a',
                        danger:          '#ff4e5b',
                    },
                    boxShadow: {
                        'glow-cyan':    '0 0 24px rgba(0, 240, 255, 0.18)',
                        'glow-magenta': '0 0 24px rgba(255, 45, 149, 0.18)',
                    },
                },
            },
        };
    </script>

    <link rel="stylesheet" href="/static/css/style.css">

    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-full font-sans text-ink antialiased relative {% block body_class %}bg-stage{% endblock %}">
    {% block body %}{% endblock %}
</body>
</html>
