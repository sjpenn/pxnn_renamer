<h2 class="text-sm uppercase tracking-wider text-ink-dim mb-3">Activity Feed</h2>
<ul class="divide-y divide-hairline text-sm">
  {% for row in rows %}
  <li class="py-2 flex items-center gap-3">
    <span class="text-ink-mute w-20 shrink-0">{{ row.created_at.strftime('%H:%M') if row.created_at else '' }}</span>
    <span class="text-ink w-40 shrink-0 truncate">{{ row.username }}</span>
    <span class="text-ink-dim w-40 shrink-0 truncate">{{ row.event_type }}</span>
    <span class="text-ink truncate">{{ row.summary }}</span>
  </li>
  {% else %}
  <li class="py-2 text-ink-mute">No activity yet.</li>
  {% endfor %}
</ul>
